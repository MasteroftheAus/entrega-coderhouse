{% extends 'miiapp/base.html' %}

{% block content %}

<style>

.profile-card{
    max-width:500px;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

.profile-avatar{
    margin-bottom:20px;
}

.profile-avatar img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
}

.profile-info p{
    font-size:16px;
    margin:8px 0;
}

.edit-btn{
    margin-top:20px;
    padding:8px 16px;
    background:coral;
    border:none;
    color:white;
    border-radius:5px;
    text-decoration:none;
    display:inline-block;
}

.edit-btn:hover{
    background:salmon;
}

</style>


<div class="profile-card">

    <div class="profile-avatar">

        {% if user.avatar.image %}
            <img src="{{ user.avatar.image.url }}">
        {% else %}
            <p>No avatar uploaded</p>
        {% endif %}

    </div>

    <div class="profile-info">
        <p><strong>Username:</strong> {{ user.username }}</p>
        <p><strong>Name:</strong> {{ user.name }}</p>
        <p><strong>Surname:</strong> {{ user.surname }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
    </div>

    <a href="{% url 'miiapp:edit_profile' %}" class="edit-btn">
        Edit profile
    </a>

    
    <a href="{% url 'messaging:send_user_message' user.id %}" class="edit-btn">
        Send message</a>

</div>

{% endblock content %}
